openapi: 3.0.1
info:
  title: Payments-Service
  description: Payments Service API
  contact:
    name: Violet.io
    url: https://violet.io
  version: v1
servers:
- url: https://sandbox-api.violet.io/v1
tags:
- name: Payments - Addresses
- name: Payments - Distributions
- name: Payments - Payment Capture
- name: Payments - Payment Health
- name: Payments - Payment Health Validation
- name: Payments - Payment Integration Health
- name: Payments - Payout Accounts
- name: Payments - Payout Methods
- name: Payments - Platform Configurations
- name: Payments - Platform Connections
- name: Payments - Transfers
- name: Payments - Payouts
- name: Payments - Payment Transactions
- name: Payments - Payment Transfers
- name: Payments - Payout Account Migrations
- name: Payments - Refunds
- name: Payments - Subscriptions
- name: Payments - Maintenance
- name: Payments - Supported Country Codes
- name: Payments - Webhooks
paths:
  /payments/payment_platform_configurations:
    post:
      tags:
      - Payments - Platform Configurations
      summary: Create Payment Platform Configuration
      description: Creates a new PaymentPlatformConfiguration for an existing PaymentPlatformConnection.
        Only one configuration is allowed per connection. The connection must exist
        and belong to the specified developer.
      operationId: createConfiguration
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentPlatformConfigurationRequest'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConfiguration'
  /payments/payment_platform_configurations/{configuration_id}:
    get:
      tags:
      - Payments - Platform Configurations
      summary: Get Payment Platform Configuration by ID
      description: Retrieves a PaymentPlatformConfiguration by its primary key ID.
      operationId: getConfigurationById
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: configuration_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConfiguration'
    put:
      tags:
      - Payments - Platform Configurations
      summary: Update Payment Platform Configuration
      description: "Updates a PaymentPlatformConfiguration. Immutable fields (connectionId,\
        \ developerId, appId) cannot be changed."
      operationId: updateConfiguration
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: configuration_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentPlatformConfiguration'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConfiguration'
    delete:
      tags:
      - Payments - Platform Configurations
      summary: Delete Payment Platform Configuration
      description: Deletes a PaymentPlatformConfiguration. This is a hard delete.
      operationId: deleteConfiguration
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: configuration_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /payments/payment_platform_configurations/developer/{developer_id}:
    get:
      tags:
      - Payments - Platform Configurations
      summary: Get Payment Platform Configuration
      description: Retrieves a PaymentPlatformConfiguration by developer and app.
      operationId: getConfiguration
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: app_id
        in: query
        schema:
          type: integer
          format: int32
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConfiguration'
  /payments/payment_platform_configurations/connection/{connection_id}:
    get:
      tags:
      - Payments - Platform Configurations
      summary: Get Payment Platform Configuration by Connection ID
      description: Retrieves a PaymentPlatformConfiguration by its owning connection
        ID.
      operationId: getConfigurationByConnectionId
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: connection_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConfiguration'
  /payments/payment_platform_configurations/developer/{developer_id}/list:
    get:
      tags:
      - Payments - Platform Configurations
      summary: List Payment Platform Configurations
      description: Lists all PaymentPlatformConfigurations for a developer.
      operationId: listConfigurations
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentPlatformConfiguration'
  /payments/payment_platform_connections:
    post:
      tags:
      - Payments - Platform Connections
      summary: Create Payment Platform Connection
      description: "Creates a new PaymentPlatformConnection for a developer using\
        \ platform payments. The developer must have isUsingPlatformPayments = true.\
        \ Only one active connection is allowed per platformCode. If credential_id\
        \ is provided, enables direct credential lookup for transfers."
      operationId: createConnection
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentPlatformConnectionRequest'
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/payment_platform_connections/{connection_id}:
    get:
      tags:
      - Payments - Platform Connections
      summary: Get Payment Platform Connection by ID
      description: "Retrieves a PaymentPlatformConnection by its primary key ID. When\
        \ extended=true, syncs with Stripe and populates stripePlatformAccount."
      operationId: getConnectionById
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: connection_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: extended
        in: query
        schema:
          type: boolean
          default: false
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
    delete:
      tags:
      - Payments - Platform Connections
      summary: Deactivate Payment Platform Connection
      description: Deactivates a PaymentPlatformConnection by setting isActive = false.
        Does NOT delete the record to preserve audit trail. A new connection can be
        created for the same platformCode after deactivation.
      operationId: deactivateConnection
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: connection_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/payment_platform_connections/developer/{developer_id}:
    get:
      tags:
      - Payments - Platform Connections
      summary: Get Payment Platform Connection
      description: "Retrieves an active PaymentPlatformConnection for a developer.\
        \ If app_id is provided, looks up by developer + app. Falls back to developer-level\
        \ connection with null platformCode."
      operationId: getConnection
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: app_id
        in: query
        schema:
          type: integer
          format: int32
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/payment_platform_connections/developer/{developer_id}/code/{platform_code}:
    get:
      tags:
      - Payments - Platform Connections
      summary: Get Payment Platform Connection by Platform Code
      description: "Retrieves an active PaymentPlatformConnection by developer and\
        \ platform code. Platform code is the developer-defined vanity name (e.g.,\
        \ 'ACME_UK', 'ACME_US')."
      operationId: getConnectionByPlatformCode
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: platform_code
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/developer/{developer_id}/banking_country:
    get:
      tags:
      - Payments - Platform Connections
      summary: Get Developer Banking Country
      description: "Returns the banking country for a developer. If platform_code\
        \ is provided, resolves via PaymentPlatformConnection. Otherwise falls back\
        \ to the developer's PayoutAccount country code."
      operationId: getDeveloperBankingCountry
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: platform_code
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankingCountryResponse'
  /payments/payment_platform_connections/developer/{developer_id}/is_multi_platform:
    get:
      tags:
      - Payments - Platform Connections
      summary: Check if Developer is Multi-Platform
      description: Checks if a developer has more than one active PaymentPlatformConnection.
        Used during checkout to determine if platform_code is required.
      operationId: isMultiPlatformDeveloperEndpoint
      parameters:
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: boolean
  /payments/payment_platform_connections/developer/{developer_id}/list:
    get:
      tags:
      - Payments - Platform Connections
      summary: List Payment Platform Connections
      description: "Lists all active PaymentPlatformConnections for a developer. Returns\
        \ connections for all platform codes. When extended=true, populates stripePlatformAccount\
        \ from the database."
      operationId: listConnections
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: extended
        in: query
        schema:
          type: boolean
          default: false
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/payment_platform_connections/developer/{developer_id}/validate:
    get:
      tags:
      - Payments - Platform Connections
      summary: Validate and Resolve Platform Code
      description: "Validates a platform code for checkout and returns the resolved\
        \ PaymentPlatformConnection. For single-platform developers, platform code\
        \ is optional. For multi-platform developers, platform code is required. Returns\
        \ 400 if platform code is required but missing or invalid."
      operationId: validateAndResolvePlatformCodeEndpoint
      parameters:
      - name: developer_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: platform_code
        in: query
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPlatformConnection'
  /payments/{account_type}/{account_id}/distributions/{distribution_id}:
    get:
      tags:
      - Payments - Distributions
      summary: Get Distribution by Id
      operationId: getDistributionById
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: account_type
        in: path
        required: true
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: distribution_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
