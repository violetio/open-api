  /payments/{account_type}/{account_id}/distributions:
    get:
      tags:
      - Payments - Distributions
      summary: Get Distributions
      operationId: getDistributions
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: account_type
        in: path
        required: true
        schema:
          type: string
      - name: account_id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: app_id
        in: query
        schema:
          type: integer
          format: int32
      - name: include_merchants
        in: query
        schema:
          type: boolean
          default: true
      - name: include_channels
        in: query
        schema:
          type: boolean
          default: true
      - name: size
        in: query
        schema:
          type: integer
          format: int32
          default: 20
      - name: page
        in: query
        schema:
          type: integer
          format: int32
          default: 1
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageDistribution'
  /payments/transfers/{transfer_id}:
    get:
      tags:
      - Payments - Transfers
      summary: Get Payout Transfer
      operationId: getTransfer
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
        schema:
          type: integer
          format: int32
      - name: transfer_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        default:
          description: default response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutTransfer'
  /payments/transfers/external/{external_transfer_id}:
    get:
      tags:
      - Payments - Transfers
      summary: Get Transfer by External Id
      operationId: getTransferByExternalId
      parameters:
      - name: X-Violet-Token
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Secret
        in: header
        required: true
        schema:
          type: string
      - name: X-Violet-App-Id
        in: header
        required: true
