components:
  schemas:
    PaymentPlatformConfiguration:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for this configuration.
          format: int64
        developer_id:
          type: integer
          description: Unique identifier of the developer who owns this configuration.
          format: int32
        payment_platform_connection_id:
          type: integer
          description: Unique identifier of the PaymentPlatformConnection this configuration
            belongs to. 1:1 relationship.
          format: int64
        app_id:
          type: integer
          description: Unique identifier of the Violet application. Optional - connection
            can apply to multiple apps.
          format: int32
        capture_method:
          type: string
          description: "How payments are captured. AUTOMATIC captures immediately,\
            \ CUSTOM allows manual capture."
          enum:
          - AUTOMATIC
          - CUSTOM
          - DISABLED
          - EXTERNAL
        transfer_method:
          type: string
          description: "How transfers to merchants are initiated. AUTOMATIC triggers\
            \ on payment capture, CUSTOM allows manual control."
          enum:
          - AUTOMATIC
          - CUSTOM
          - DISABLED
          - EXTERNAL
        distributions_algorithm:
          type: string
          description: "Name of the algorithm used to calculate distributions. Examples:\
            \ COMMISSION_DEDUCTED_TOTALS_ALGORITHM_V3, CHANNEL_PAYS_PAYMENT_PROVIDER_FEES_ALGORITHM_V2."
        tax_remitter:
          type: string
          description: "Who is responsible for remitting taxes. APP means the channel\
            \ remits, MERCHANT means the merchant remits."
          enum:
          - APP
          - MERCHANT
        transfer_mechanism:
          type: string
          description: "How transfers are executed. STANDARD_TRANSFERS uses Stripe\
            \ /v1/transfers, DESTINATION_PAYMENTS uses Payment Intent with transfer_data.destination."
          enum:
          - STANDARD_TRANSFERS
          - DESTINATION_PAYMENTS
        destination_payment_method_id:
          type: string
          description: Stripe payment method ID (pm_xxx) for destination payments.
            Required when transferMechanism is DESTINATION_PAYMENTS.
        destination_payment_customer_id:
          type: string
          description: "Stripe customer ID (cus_xxx) for destination payments. Optional,\
            \ used with destinationPaymentMethodId."
        date_created:
          type: string
          description: Time at which this configuration was created. In ISO-8601 format.
          format: date-time
        date_last_modified:
          type: string
          description: Time at which this configuration was last modified. In ISO-8601
            format.
          format: date-time
        transfer_schedule:
          $ref: '#/components/schemas/TransferSchedule'
      description: "Configuration for payment processing behavior, including capture\
        \ method, transfer settings, and distribution algorithm. Owned by a PaymentPlatformConnection."
    TransferSchedule:
      type: object
      properties:
        require_fulfillment:
          type: boolean
          description: "Whether bags must be in SHIPPED or DELIVERED status before\
            \ transfers are executed. When true, only distributions for fulfilled\
            \ bags are included in transfer calculations. When false (default), transfers\
            \ execute immediately after payment capture regardless of fulfillment\
            \ status."
          default: false
        time_interval_seconds:
          type: integer
          description: "Minimum time interval in seconds between transfers for a merchant.\
            \ When 0 (default), transfers execute immediately. When > 0, transfers\
            \ are batched and executed at the specified interval. Example: 86400 =\
            \ daily transfers, 604800 = weekly transfers."
          format: int64
          default: 0
        allow_weekend_transfers:
          type: boolean
          description: "When false (default), eligible dates are adjusted to fall\
            \ on business days (Mon-Fri) only. Distributions that would be eligible\
            \ on weekends are deferred to the next Monday. When true, transfers can\
            \ be processed on any day including weekends."
          default: false
    CreatePaymentPlatformConfigurationRequest:
      type: object
      properties:
        payment_platform_connection_id:
          type: integer
          format: int64
        developer_id:
          type: integer
          format: int32
        app_id:
          type: integer
          format: int32
        capture_method:
          type: string
          enum:
          - AUTOMATIC
          - CUSTOM
          - DISABLED
          - EXTERNAL
        transfer_method:
          type: string
          enum:
          - AUTOMATIC
          - CUSTOM
          - DISABLED
          - EXTERNAL
        distributions_algorithm:
          type: string
        tax_remitter:
          type: string
          enum:
          - APP
          - MERCHANT
        transfer_mechanism:
          type: string
          enum:
          - STANDARD_TRANSFERS
          - DESTINATION_PAYMENTS
        require_fulfillment:
          type: boolean
        time_interval_seconds:
          type: integer
          format: int64
        allow_weekend_transfers:
          type: boolean
        destination_payment_method_id:
          type: string
        destination_payment_customer_id:
          type: string
    PaymentPlatformConnection:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the payment platform connection.
          format: int64
        developer_id:
          type: integer
          description: Unique identifier of the developer who owns this connection.
          format: int32
        app_id:
          type: integer
          description: Unique identifier of the Violet application associated with
            this connection. Nullable - connection can apply to multiple apps.
          format: int32
        platform_code:
          type: string
          description: "Developer-defined identifier for this platform connection\
            \ (e.g., 'ACME_UK', 'ACME_US').Must be unique per developer. Used for\
            \ routing orders to the correct payment platform."
        payment_provider:
          type: string
          description: "Payment provider for this connection. Currently supports STRIPE,\
            \ NUVEI, CREDOVA, EXTERNAL."
          enum:
          - STRIPE
          - NUVEI
          - CREDOVA
          - EXTERNAL
        payment_provider_account_id:
          type: string
          description: "Identifier of the platform account in the payment provider\
            \ (e.g., acct_xxx for Stripe). Links to StripePlatformAccount via string\
            \ lookup."
        credential_id:
          type: integer
          description: "Identifier of the credential in CredentialService. Nullable\
            \ for backwards compatibility. Future enhancement: used for direct credential\
            \ lookup without developerId."
          format: int64
        is_active:
          type: boolean
          description: "Whether this connection is active and can be used for payment\
            \ processing. Only one active connection per (developer, platformCode)\
            \ combination."
        date_created:
          type: string
          description: Time at which this connection was created. In ISO-8601 format.
          format: date-time
        date_last_modified:
          type: string
          description: Time at which this connection was last modified. In ISO-8601
            format.
          format: date-time
        date_deactivated:
          type: string
          description: Time at which this connection was deactivated. In ISO-8601
            format.
          format: date-time
        stripe_platform_account:
          $ref: '#/components/schemas/StripePlatformAccount'
      description: "Represents a developer's connection to a payment platform account\
        \ (e.g., Stripe). Used for payment capture, distribution tracking, and transfer\
        \ processing."
    StripePlatformAccount:
      type: object
      properties:
        account_id:
          type: string
          description: Unique identifier for this account in Stripe.
        account_type:
          type: string
          description: "The type of Stripe Connect account, either EXPRESS or STANDARD."
          enum:
          - STANDARD
        banking_country:
          type: string
          description: "Banking country of the Stripe account, taken directly from\
            \ the Stripe account object."
        banking_currency:
          type: string
          description: "Banking currency of the Stripe account, taken directly from\
            \ the Stripe account object."
        charges_enabled:
          type: boolean
          description: Whether the Stripe account can create charges and facilitate
            payments. Taken directly from the Stripe account object.
        payouts_enabled:
          type: boolean
          description: Whether the Stripe account can receive payouts. Taken directly
            from the Stripe account object.
        date_created:
          type: string
          description: Time at which the object was created. In ISO-8601 format.
          format: date-time
        date_last_modified:
          type: string
          description: Time at which the object was last modified. In ISO-8601 format.
          format: date-time
      description: Violet entity representing a Stripe account for Violet channels
        using their own platform Stripe account to facilitate payments.
    CreatePaymentPlatformConnectionRequest:
      type: object
      properties:
        developer_id:
          type: integer
          format: int32
        app_id:
          type: integer
          format: int32
        payment_provider_account_id:
          type: string
        platform_code:
          type: string
        credential_id:
          type: integer
          format: int64
    BankingCountryResponse:
      type: object
      properties:
        banking_country:
          type: string
          description: Two-letter country code of the banking country for the developer's
            platform.
